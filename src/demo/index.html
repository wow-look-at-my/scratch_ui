<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="darkreader-lock" />
<title>Scratch Proto — Spec Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../components/scratch-tokens.css" />
<link rel="stylesheet" href="scratch-proto.css" />
<style>
  /* ── Index-only layout ─────────────────────────────────── */
  .index-main { max-width: 560px; margin: 0 auto; padding: var(--sp-7) var(--sp-4); }
  .index-eyebrow {
    font-size: var(--fs-micro); letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-disabled);
  }
  .index-eyebrow::before { content: '// '; }
  .index-main h1 { font-size: var(--fs-h1); margin: var(--sp-1) 0 var(--sp-5); }
  .index-list { list-style: none; display: flex; flex-direction: column; gap: var(--gap-stack); }
  .index-list a {
    display: block; padding: var(--pad-card);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--r-base);
    color: var(--text-bright);
    transition: border-color var(--dur) var(--ease-out), background var(--dur) var(--ease-out);
  }
  .index-list a:hover { border-color: var(--accent); background: var(--bg-elevated); color: var(--text-bright); }
  .index-list .name { display: block; font-family: var(--font-display); font-size: var(--fs-lg); font-weight: 600; }
  .index-list .desc { display: block; margin-top: var(--sp-1); font-size: var(--fs-small); color: var(--text-muted); }
</style>
</head>
<body>
<main class="index-main">
  <div class="index-eyebrow">scratch proto</div>
  <h1>Design language spec</h1>
  <ul class="index-list">
    <li>
      <a href="Scratch%20Proto.html">
        <span class="name">Design language</span>
        <span class="desc">Tokens, components, and rules — the full living style guide.</span>
      </a>
    </li>
    <li>
      <a href="Icon%20Language.html">
        <span class="name">Icon language</span>
        <span class="desc">The icon system: glyph grammar, sizes, and usage.</span>
      </a>
    </li>
  </ul>
</main>
</body>
</html>
