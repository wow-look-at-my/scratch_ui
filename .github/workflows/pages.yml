name: Deploy GitHub Pages

# Publishes the site surface described by pages-manifest.json to GitHub Pages
# (repo Pages source: GitHub Actions). The manifest — not this workflow —
# decides what gets published; the assembly step just executes it. This is a
# deploy workflow: the master branch filter is intentional and must stay.
# PR previews are unaffected and stay on buildhost (preview.yml).

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; never cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble _site/ from pages-manifest.json
        uses: wow-look-at-my/actions@typescript#latest
        with:
          script: |
            const out = '_site';
            const manifest = JSON.parse(fs.readFileSync('pages-manifest.json', 'utf-8'));
            const outRoot = path.resolve(out);
            fs.rmSync(outRoot, { recursive: true, force: true });
            fs.mkdirSync(outRoot, { recursive: true });
            const lines: string[] = [];
            for (const entry of manifest.entries) {
              // '/x' site paths resolve INSIDE the artifact root, and never above it
              const dest = path.resolve(outRoot, '.' + path.posix.join('/', entry.to));
              if (dest !== outRoot && !dest.startsWith(outRoot + path.sep)) {
                core.setFailed(`pages-manifest.json: output path escapes the site root: ${entry.to}`);
                return;
              }
              fs.mkdirSync(path.dirname(dest), { recursive: true });
              if (entry.redirect != null) {
                const url = encodeURI(entry.redirect);
                fs.writeFileSync(dest, [
                  '<!DOCTYPE html>',
                  '<html lang="en">',
                  '<head>',
                  '<meta charset="UTF-8" />',
                  `<meta http-equiv="refresh" content="0; url=${url}" />`,
                  `<link rel="canonical" href="${url}" />`,
                  '<title>Moved</title>',
                  '</head>',
                  '<body>',
                  `<p><a href="${url}">Moved to ${entry.redirect}</a></p>`,
                  '</body>',
                  '</html>',
                  '',
                ].join('\n'));
                lines.push(`redirect  ${entry.to}  ->  ${entry.redirect}`);
              } else {
                if (!fs.existsSync(entry.from)) {
                  core.setFailed(`pages-manifest.json: input path not found: ${entry.from}`);
                  return;
                }
                fs.cpSync(entry.from, dest, { recursive: true });
                lines.push(`copy      ${entry.from}  ->  ${entry.to}`);
              }
            }
            const files = fs.readdirSync(out, { recursive: true })
              .map(String)
              .filter((n) => fs.statSync(path.join(out, n)).isFile());
            core.info(`pages-manifest.json -> ${out}/ (${files.length} files):`);
            for (const l of lines) core.info(`  ${l}`);

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
