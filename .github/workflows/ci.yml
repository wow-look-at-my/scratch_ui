name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax-check JS
        uses: wow-look-at-my/actions@typescript#latest
        with:
          script: |
            // Static checks for a plain-browser prototype: there is no build
            // system or test suite, so CI validates that every source file at
            // least parses.
            //   *.js — classic scripts loaded via <script defer>: node --check
            const names = fs.readdirSync('.').filter((n) => fs.statSync(n).isFile());
            const js = names.filter((n) => n.endsWith('.js')).sort();
            if (js.length === 0) {
              core.setFailed('Repo layout changed: found 0 .js files at the root — update the CI syntax check to cover the new layout.');
              return;
            }
            for (const f of js) {
              core.info(`node --check ${f}`);
              await $`node --check ${f}`;
            }
            core.info(`Syntax OK: ${js.length} .js (node --check)`);
